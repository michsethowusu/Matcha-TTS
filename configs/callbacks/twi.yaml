defaults:
  - model_summary.yaml
  - rich_progress_bar.yaml
  - early_stopping.yaml
  - tf32.yaml
  - _self_

# Like the default ModelCheckpoint, but every saved checkpoint is also pushed to the HF Hub.
# repo_id resolves from $HF_REPO_ID (default michsethowusu/matcha-twi); token from $HF_TOKEN.
model_checkpoint:
  _target_: matcha.utils.hf_checkpoint.HFModelCheckpoint
  repo_id: ${oc.env:HF_REPO_ID,michsethowusu/matcha-twi}
  path_in_repo: checkpoints
  private: true
  dirpath: ${paths.output_dir}/checkpoints
  filename: twi_{epoch:03d}
  # Keep EVERY epoch's checkpoint (save_top_k=-1): nothing is pruned locally or on the Hub, so
  # we can pick any epoch afterwards. monitor is kept only to label the best in logs.
  monitor: sub_loss/val_diff_loss
  mode: min
  verbose: false
  save_last: true        # checkpoints/last.ckpt — always the final epoch
  save_top_k: -1         # keep ALL epoch checkpoints (no deletion, local + mirrored on HF)
  every_n_epochs: 1      # save + push every epoch so HF updates frequently "as we go"
  save_weights_only: false
  every_n_train_steps: null
  train_time_interval: null
  save_on_train_epoch_end: null
