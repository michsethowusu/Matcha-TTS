_target_: matcha.data.text_mel_datamodule.TextMelDataModule
name: ghana_speech
# 3-field filelists: wav_path|lang_id|phonemes (lang_id repurposes the speaker slot).
# Default to filtered filelists (1-10s, 10h/lang cap); run filter script first.
train_filelist_path: /mnt/volume_d2wey28/data/ghana_speech/train_filtered.txt
valid_filelist_path: /mnt/volume_d2wey28/data/ghana_speech/val_filtered.txt
batch_size: 64
num_workers: 8
pin_memory: True
cleaners: [twi_phonemes]
add_blank: True
n_spks: 42
n_fft: 1024
n_feats: 80
sample_rate: 22050
hop_length: 256
win_length: 1024
f_min: 0
f_max: 8000
# Stats for the re-filtered set (min 3s, random cap to 20h/lang). The model inherits these
# via ${data.data_statistics}, so its mel_mean/mel_std buffers match the normalization the
# data is trained with (important: synthesise() denormalizes with these buffers).
data_statistics:
  mel_mean: -5.670213434000389
  mel_std: 3.317951496927415
seed: ${seed}
load_durations: false
